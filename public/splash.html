<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Streak Wall</title>
    <link rel="modulepreload" href="splash.js">
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 100dvw;
        height: 100dvh;
        overflow: hidden;
        display: grid;
        place-items: center;
        background: #14151a;
        color: #f4f1de;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      main {
        display: grid;
        gap: 0.75rem;
        justify-items: center;
        text-align: center;
        padding: 1rem;
        width: 100%;
        max-width: 420px;
      }
      h1 { margin: 0; font-size: 24px; }
      #prompt { margin: 0; color: #ff6f91; font-style: italic; font-size: 15px; }
      #progress { margin: 0; color: #9a9aa5; font-size: 13px; }
      #start-btn {
        background: #ff6f91;
        color: #1a1a1a;
        border: none;
        padding: 10px 24px;
        border-radius: 999px;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Streak Wall</h1>
      <p id="prompt">Loading today's prompt…</p>
      <p id="progress">— % painted · — redditors today</p>
      <button id="start-btn" type="button">Paint today's wall →</button>
    </main>
    <script src="splash.js" type="module"></script>
  </body>
</html>
